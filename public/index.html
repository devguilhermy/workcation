<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="build/tailwind.css" />
    </head>
    <body class="bg-gray-100 max-w-md mx-auto">
        <div class="p-12">
            <img
                class="h-12"
                src="img/workcation-logo.svg"
                alt="Workcation logo"
            />
            <img
                class="mt-6 rounded-lg shadow-lg"
                src="img/workcationing.jpg"
                alt="Man workcationing on the beach"
            />
            <h1 class="mt-6 text-2xl font-bold text-gray-800 leading-tight">
                You can work from anywhere.
                <span class="text-blue-600">Take advantage of it.</span>
            </h1>
            <p class="mt-2 text-gray-600 font-medium">
                Workcation helps you find work places work-friendly places so
                you can relax but keep working on what's important
            </p>
            <div class="mt-6">
                <a
                    class="inline-block px-5 py-3 bg-blue-600 uppercase text-sm text-white tracking-wider font-semibold rounded-lg shadow-lg"
                    href="#"
                    >Book your escape</a
                >
            </div>
        </div>
        <p id="width"></p>
        <script>
            function setWidth() {
                document.getElementById("width").innerText = window.outerWidth;
            }
            setWidth();
            window.addEventListener("resize", setWidth);
        </script>
    </body>
</html>
